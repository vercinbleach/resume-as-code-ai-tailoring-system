# yaml-language-server: $schema=https://raw.githubusercontent.com/rendercv/rendercv/refs/tags/v2.8/schema.json
cv:
  name: Vincenzo Rosciano
  location: Barcelona, ES
  email: vercinxd@gmail.com
  phone: "+34657632514"
  custom_connections:
    - fontawesome_icon: linkedin
      placeholder: LinkedIn
      url: https://www.linkedin.com/in/vincenzo-carlo-rosciano/
    - fontawesome_icon: github
      placeholder: GitHub
      url: https://github.com/vercinbleach
  sections:
    Education:
      - name: Canterbury Christ Church University
        summary: BSc in Computer Science
        status: "Expected graduation: 2027"
      - name: iFP Grupo Planeta
        summary: CFGS Higher National Diploma, Web Application Developer
        status: "2023"
        location: Barcelona, ES
      - name: La Salle La Colina
        summary: High School Diploma
        status: "2019"
        location: Caracas, VE
    Experience:
      - company: Grup Montaner
        position: Lead Software Engineer
        start_date: 2026-01
        end_date: present
        location: Barcelona, ES
        highlights:
          - Lead and coach two developers on programming, task decomposition, and consistent engineering practices within a three-person team.
          - Coordinate a GitFlow-based delivery model with main, develop, work branches, and pull requests, aligning parallel development with controlled integration.
      - company: Grup Montaner
        position: Software Engineer
        start_date: 2025-07
        end_date: 2025-12
        location: Barcelona, ES
        highlights:
          - Architected a full-stack BPM platform for a EUR 90M-revenue organization using an open-source Java engine and Next.js/React to centralize cross-department workflows.
          - Partnered weekly or biweekly with the CEO, CFO, Controller, and COO to prioritize cross-department process digitalization, centralizing data, approvals, and documents through integrations with CRM, HR, certified communications, and an API-less legacy ERP.
      - company: Neverhack (formerly Innovery)
        position: Software Engineer
        start_date: 2023-05
        end_date: 2025-07
        location: Barcelona, ES
        highlights:
          - Re-engineered 90% of the logic across approximately 25 processes in a legacy no-code platform, reducing incoming bug reports from 10-25 per month to zero and shifting demand to enhancements and new processes.
          - Connected 10+ platforms, including CRM, ERP, LinkedIn, and Microsoft 365, automating CRM-ERP synchronization and reducing data silos.
          - Delivered 10+ Splunk SOAR playbooks with Python and Bash for automated IP blocking and remediation, saving 20+ hours weekly and EUR 34K annually.
    "Projects & Open Source":
      - label: "Editify - Voice x Fintech Hackathon | [GitHub](https://github.com/vercinbleach/hackaton-cala-voice-of-finance)"
        details: Developed a multi-agent financial video editor in one night as sole developer on a three-person team, orchestrating Cala, Codex, ElevenLabs, HyperFrames, and FFmpeg.
      - label: AI Document Support Assistant
        details: Implemented a Python/FastAPI and LangChain assistant that analyzed internal PDFs and recommended ticket-resolution procedures and supporting documents.
      - label: AI-Powered Mortgage Agent
        details: Contributed to a monitored weekly LLM workflow covering public mortgage and loan products from every bank in Spain, combining Python, tool calling, deterministic validation, LLM-as-judge experiments, and human review.
      - label: "SuiteCRM Open Source | [Open PR](https://github.com/SuiteCRM/SuiteCRM/pull/10766)"
        details: Extended SuiteCRM's V8 JSON API with base64 DocumentRevision uploads, extension validation, and MIME metadata; the patch runs in production internally and across downstream forks, with thanks from 10+ users.
    Technical Skills:
      - label: Backend
        details: Microservices, Python, FastAPI, Java, Spring Boot, PHP, MySQL, PostgreSQL
      - label: Frontend
        details: React, Next.js, TypeScript, Tailwind CSS, shadcn/ui
      - label: Tools
        details: Docker, AWS, Git, Linux, CI/CD, Splunk SOAR, Bash, Power BI
      - label: Data & Automation
        details: Selenium, Pandas, LangChain, RPA, REST/SOAP APIs
      - label: Languages
        details: Spanish (native), English (fluent), Italian (fluent)
design:
  theme: sb2nov
  page:
    size: a4
    top_margin: 1.3cm
    bottom_margin: 1.05cm
    left_margin: 1.25cm
    right_margin: 1.25cm
    show_footer: false
    show_top_note: false
  typography:
    line_spacing: 0.6em
    alignment: left
    date_and_location_column_alignment: right
    font_size:
      body: 10.5pt
      name: 25pt
      connections: 9.3pt
      section_titles: 1.25em
    small_caps:
      section_titles: true
  header:
    space_below_name: 0.2cm
    space_below_headline: 0cm
    space_below_connections: 0.6cm
    connections:
      phone_number_format: international
      show_icons: true
      display_urls_instead_of_usernames: true
      separator: "|"
      space_between_connections: 0.22cm
  section_titles:
    type: with_full_line
    line_thickness: 0.5pt
    space_above: 0.3cm
    space_below: 0.18cm
  sections:
    allow_page_break: false
    space_between_regular_entries: 0.2em
    space_between_text_based_entries: 0.15em
  entries:
    date_and_location_width: 4.35cm
    side_space: 0.1cm
    space_between_columns: 0.08cm
    allow_page_break: false
    short_second_row: false
    degree_width: 0.8cm
    highlights:
      space_left: 0.12cm
      space_above: 0cm
      space_between_items: 0cm
      space_between_bullet_and_text: 0.45em
  templates:
    date_range: START_DATE - END_DATE
    normal_entry:
      main_column: |-
        **NAME**
        *SUMMARY*
      date_and_location_column: |-
        LOCATION
        *STATUS*
    experience_entry:
      main_column: |-
        **COMPANY**
        *POSITION*
        HIGHLIGHTS
      date_and_location_column: |-
        **LOCATION**
        *DATE*
locale:
  language: english
  present: Present
settings:
  current_date: today
  render_command:
    output_folder: ../output/pdf
    typst_path: OUTPUT_FOLDER/vincenzo-rosciano-one-page.typ
    pdf_path: OUTPUT_FOLDER/vincenzo-rosciano-one-page.pdf
    markdown_path: OUTPUT_FOLDER/vincenzo-rosciano-one-page.md
    html_path: OUTPUT_FOLDER/vincenzo-rosciano-one-page.html
    png_path: OUTPUT_FOLDER/vincenzo-rosciano-one-page.png
    dont_generate_markdown: false
    dont_generate_html: false
    dont_generate_typst: false
    dont_generate_pdf: false
    dont_generate_png: false
  pdf_title: Vincenzo Rosciano - Resume
